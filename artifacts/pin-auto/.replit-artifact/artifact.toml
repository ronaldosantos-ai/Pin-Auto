kind = "web"
previewPath = "/"
title = "PinAuto"
version = "1.0.0"
id = "artifacts/pin-auto"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21029

[services.development]
run = "pnpm --filter @workspace/pin-auto run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pin-auto", "run", "build" ]
publicDir = "artifacts/pin-auto/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21029"
BASE_PATH = "/"
